name: Build & publish Docker image

on:
  push:
    tags:
      - 'v*.*.*'        # e.g. v2.1.0
  pull_request:
    branches: [main]    # build-only (no push) for PRs

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. ghcr.io/johagan94/octave
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha,prefix=sha-,format=short

      - name: Build (and push on tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: build
    # Run against the locally built image (not GHCR) so PRs are covered too.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile package
        run: python -m compileall octave

      - name: Install test dependencies
        run: pip install pytest

      - name: Unit tests
        run: pytest tests

  docs-check:
    name: Docs check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate CA template XML
        run: |
          python3 -c "import xml.etree.ElementTree as ET; ET.parse('templates/octave.xml'); print('templates/octave.xml OK')"
      - name: Check README exists
        run: |
          test -s README.md && echo "README.md OK"

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [build, smoke-test, docs-check]
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            RANGE=""
          else
            RANGE="$PREV_TAG..HEAD"
          fi
          echo "changes<<EOF" >> "$GITHUB_OUTPUT"
          git log $RANGE --pretty=format:"- %s (%h)" >> "$GITHUB_OUTPUT"
          printf '\n' >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Octave ${{ github.ref_name }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changes }}

            ## Docker Image
            ```
            docker pull ghcr.io/${{ github.repository }}:latest
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```
          generate_release_notes: true
          draft: false
          prerelease: false
